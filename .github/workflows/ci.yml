name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      # Bridges must be built before the test step: host-server integration and bridge conformance
      # tests load each bridge's compiled dist/bridge.js (gitignored), so an unbuilt tree fails them.
      - name: Build bridges
        run: bun run build

      - name: Test
        run: bun test

      # Generated runtime assets (gitignored): produced here, not committed. This is the build
      # step native (iOS/Android) packaging would run before bundling the asset into the app.
      - name: Build native runtime
        run: bun run build:native
