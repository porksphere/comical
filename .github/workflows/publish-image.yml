name: Publish image (comical-host)

# Build and push the host-server image to ghcr.io/porksphere/comical-host.
#
#   push to master  -> :latest, :sha-<short>
#   git tag v1.2.0  -> :1.2.0, :1.2, :latest
#
# Multi-arch (amd64 + arm64). Auth uses the built-in GITHUB_TOKEN (porksphere), so the push lands
# under this repo's owner automatically — no PAT, no cross-identity credential.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/porksphere/comical-host
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
