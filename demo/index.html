    /* Flex (not grid) so an incomplete last row centers; cards don't grow, which is what lets

       below it (and any badges overlaid on the image). */
    .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.9rem 0.6rem; }

    /* A clampable title (series cards + history/activity rows): the visible text clamps to 3 lines,
       and the full text (in data-full) reveals on hover/touch as a popover overlapping whatever is
       below rather than reflowing the row taller. The enclosing item (.card / .history-item) gets
       .clamped only when actually truncated, plus .touch-active, via the handlers near init.
       (Inside the horizontal carousels the popover is clipped to the strip.) */
    .clampable { position: relative; }
    .clampable > span { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; }
    .clampable::after { content: attr(data-full); position: absolute; top: -0.25rem; left: -0.4rem; right: -0.4rem; padding: 0.25rem 0.4rem; background: #232327; color: #fff; border-radius: 6px; box-shadow: 0 8px 20px rgba(0,0,0,0.55); opacity: 0; pointer-events: none; transition: opacity 0.12s; z-index: 1; }
    .clamped:hover .clampable::after, .clamped.touch-active .clampable::after { opacity: 1; }
    .card-sub { font-size: 0.75rem; color: #888; margin-top: 0.2rem; }
    /* Home stack: each list is a section rendered per its layout hint. */
    .section { margin: 1.4rem 0; }
    .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: 0.6rem; }
    .section-head h3 { margin: 0; font-size: 1rem; }
    .see-all { background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 0.8rem; padding: 0; white-space: nowrap; }
    .see-all:hover { text-decoration: underline; }
    .carousel { display: flex; gap: 1rem; overflow-x: auto; scrollbar-width: none; padding-bottom: 0.4rem; scroll-snap-type: x mandatory; }
    .carousel::-webkit-scrollbar { display: none; }
    .carousel > .card { flex: 0 0 160px; scroll-snap-align: start; position: relative; }
    .carousel.ranked > .card { flex-basis: 180px; }
    .carousel.hero > .card { flex-basis: 280px; }
    .rank-badge { position: absolute; top: 0.45rem; left: 0.45rem; background: #2563eb; color: #fff; font-weight: 700; font-size: 0.8rem; border-radius: 6px; padding: 0.05rem 0.45rem; }
    /* Desktop: a plain carousel drops its horizontal scroll and wraps like .grid (same 150px cards,
       same gaps, 5 per row), but is capped to two full rows — the rest live behind "See all", so no
       cards are cut off. Ranked/hero keep their single-row larger presentation; mobile keeps the
       single-row peek (overridden below). */

      .carousel:not(.ranked):not(.hero) {
        flex-wrap: wrap;
        justify-content: center;
        overflow: visible;
        scroll-snap-type: none;
        gap: 0.9rem 0.6rem;
      }
      .carousel:not(.ranked):not(.hero) > .card { flex: 0 1 150px; }
      .carousel:not(.ranked):not(.hero) > .card:nth-child(n+11) { display: none; }
    }
    /* Mobile: pack grids 3-per-row and let carousels show 3 cards + a peek of the next to signal scroll. */
    @media (max-width: 560px) {
      .grid { gap: 0.8rem 0.5rem; }
      /* 3 columns: full width minus the two 0.5rem inter-card gaps, split three ways. */

      .carousel { gap: 0.5rem; }
      .carousel > .card,
      .carousel.ranked > .card { flex-basis: 30%; }
      .carousel.hero > .card { flex-basis: 72%; }
      .card-title { font-size: 0.8rem; }
      .card-sub { font-size: 0.72rem; }
    }
    .load-more-wrap { text-align: center; margin: 0.8rem 0 0; }

    /* Desktop: cover on the left spanning a stacked right column (genres / tags / stats / meta /

    #lib-menu { position: relative; width: 100%; }
    #lib-menu > #lib-toggle { width: 100%; }
    #lib-category-picker { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30; min-width: 190px; max-height: 60vh; overflow-y: auto; background: #1c1c1e; border: 1px solid #333; border-radius: 8px; padding: 0.4rem; box-shadow: 0 8px 24px rgba(0,0,0,0.55); display: flex; flex-direction: column; gap: 0.15rem; }
    #lib-category-picker[hidden] { display: none; }
    #lib-cat-head { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.05em; color: #777; padding: 0.1rem 0.4rem 0.25rem; }
    #lib-category-picker label { flex-direction: row; align-items: center; gap: 0.45rem; padding: 0.3rem 0.4rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    #lib-category-picker label:hover { background: #26262a; }
    .lib-menu-sep { border-top: 1px solid #2c2c30; margin: 0.3rem 0; }
    #lib-category-picker .lib-menu-btn { width: 100%; background: none; border: none; color: #ddd; text-align: left; padding: 0.3rem 0.4rem; cursor: pointer; font-size: 0.83rem; border-radius: 6px; }
    #lib-category-picker .lib-menu-btn:hover { background: #26262a; }
    #lib-category-picker .lib-remove-btn { width: 100%; background: none; border: none; color: #e06c6c; text-align: left; padding: 0.3rem 0.4rem; cursor: pointer; font-size: 0.83rem; border-radius: 6px; }
    #lib-category-picker .lib-remove-btn:hover { background: #2a1c1c; }
    #chapters .ch-name { flex: 1; }
    #chapters .ch-row.read .ch-name { color: #6b7280; }
    #chapters .ch-uptohere { font-size: 0.72rem; color: #888; border: 1px solid #333; background: #1c1c1e; border-radius: 6px; padding: 0.1rem 0.4rem; cursor: pointer; }
    #chapters .ch-uptohere:hover { border-color: #60a5fa; color: #ddd; }
    #chapters .ch-versions-toggle { font-size: 0.72rem; color: #aaa; border: 1px solid #333; background: #1c1c1e; border-radius: 999px; padding: 0.1rem 0.5rem; cursor: pointer; white-space: nowrap; }
    #chapters .ch-versions-toggle:hover { border-color: #60a5fa; color: #ddd; }
    #chapters .ch-versions { list-style: none; margin: 0 0 0.3rem; padding: 0 0 0 1.25rem; }
    #chapters .ch-versions li { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; border-bottom: none; font-size: 0.82rem; color: #bbb; cursor: pointer; }
    #chapters .ch-versions li:hover { color: #60a5fa; }
    #chapters .ch-versions li.read .ch-name { color: #6b7280; }
    #chapters .ch-versions .ch-dot { width: 0.45rem; height: 0.45rem; border-radius: 999px; background: #444; flex-shrink: 0; }
    #chapters .ch-versions li.read .ch-dot { background: #2563eb; }
    .history-item { position: relative; display: flex; gap: 0.75rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid #242427; }
    .history-item img { width: 44px; height: 66px; object-fit: cover; border-radius: 4px; background: #333; }
    .history-item .hi-body { flex: 1; }
    .history-item .hi-title { font-size: 0.9rem; font-weight: 600; }
    .history-item .hi-sub { font-size: 0.78rem; color: #888; }
    .history-item.read { opacity: 0.55; }
    /* Sources (multi-bridge SeriesGroup): its own button + popover, matching the tracker menu. */
    #group-menu { position: relative; width: 100%; }
    #group-menu > #group-toggle { width: 100%; background: #1c1c1e; border: 1px solid #333; color: #ddd; border-radius: 6px; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.85rem; text-align: center; }
    #group-menu > #group-toggle:hover { border-color: #60a5fa; }
    #group-panel { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30; min-width: 240px; max-width: 92vw; max-height: 65vh; overflow-y: auto; background: #1c1c1e; border: 1px solid #333; border-radius: 8px; padding: 0.6rem; box-shadow: 0 8px 24px rgba(0,0,0,0.55); }
    #group-panel[hidden] { display: none; }
    .src-section-head { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.05em; color: #777; margin: 0.1rem 0 0.3rem; }
    .src-row { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; padding: 0.3rem 0; }
    .src-id { display: flex; align-items: center; gap: 0.5rem; min-width: 0; }
    .src-id img { width: 28px; height: 40px; object-fit: cover; border-radius: 3px; background: #333; flex-shrink: 0; }
    .src-name { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .src-acts { display: flex; gap: 0.4rem; flex-shrink: 0; }
    /* Trackers: its own button + popover, anchored under the library button in the actions column. */
    #tracker-menu { position: relative; width: 100%; }
    #tracker-menu > #tracker-toggle { width: 100%; background: #1c1c1e; border: 1px solid #333; color: #ddd; border-radius: 6px; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.85rem; text-align: center; }
    #tracker-menu > #tracker-toggle:hover { border-color: #60a5fa; }
    #tracker-panel { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30; min-width: 300px; max-width: 92vw; max-height: 65vh; overflow-y: auto; background: #1c1c1e; border: 1px solid #333; border-radius: 8px; padding: 0.6rem; box-shadow: 0 8px 24px rgba(0,0,0,0.55); }
    #tracker-panel[hidden] { display: none; }
    .tracker-row { display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0; font-size: 0.85rem; }
    .tracker-row-acts { display: flex; gap: 0.35rem; }
    .tracker-search-result { padding: 0.3rem 0.4rem; cursor: pointer; border-radius: 4px; font-size: 0.84rem; }
    .tracker-search-result:hover { background: #2a2a2e; color: #60a5fa; }
    .tracker-search-result img { width: 28px; height: 42px; object-fit: cover; border-radius: 2px; vertical-align: middle; margin-right: 0.5rem; background: #333; }
    .tracker-config-item { border-bottom: 1px solid #242427; padding: 0.5rem 0; }
    .tracker-config-item:last-child { border-bottom: none; }
    .tracker-config-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.6rem; margin: 0.5rem 0; }
    .bridge-settings-entry { border-bottom: 1px solid #242427; padding: 0.5rem 0; }
    .bridge-settings-entry:last-child { border-bottom: none; padding-bottom: 0; }
    .bridge-settings-entry > summary { cursor: pointer; font-weight: 600; font-size: 0.95rem; }
    .tag-group-label { flex-shrink: 0; }
    /* Loading skeletons: while the series fetch is in flight, #detail carries .loading. The cover box
       already reserves its space (fixed .cover-wrap), and the title/description show shimmer bars so
       the real content fades in without a layout jump. Placed after the base rules so the equal-
       specificity overrides (e.g. #detail-description:empty { display:none }) lose to these. */
    @keyframes skeleton-shimmer { 100% { transform: translateX(100%); } }
    #detail.loading .cover-wrap,
    #detail.loading #detail-title,
    #detail.loading #detail-description { position: relative; overflow: hidden; background: #1f1f22; border-radius: 6px; }
    #detail.loading .cover-wrap::after,
    #detail.loading #detail-title::after,
    #detail.loading #detail-description::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); animation: skeleton-shimmer 1.3s infinite; }
    #detail.loading #detail-title { display: block; width: 55%; min-height: 1.5rem; }
    #detail.loading #detail-description { display: block; min-height: 4.5rem; }
    /* Mobile detail overrides — placed after the base detail rules so equal-specificity selectors win. */
    @media (max-width: 560px) {
      /* iOS Safari auto-zooms when focusing any text field below 16px — keep inputs at 16px on
         mobile so tapping the library search bar (et al.) doesn't zoom the page. */
      input, select, textarea { font-size: 16px; }
      /* Single column: cover + its action buttons share the top row; stats, meta, description then
         the full-width genres/tag-group scroll strips stack below. */
      .detail-head { grid-template-columns: 1fr; column-gap: 0; grid-template-rows: none;
        grid-template-areas: "cover" "stats" "meta" "desc" "genres" "tags"; }
      .detail-cover-col { flex-direction: row; gap: 0.9rem; align-items: flex-start; margin-bottom: 0.4rem; }
      .cover-wrap { flex: 0 0 116px; width: 116px; height: 174px; }
      #detail-actions { flex: 1; }
      /* In this stacked order the description sits directly above the genres strip — give it room. */
      #detail-description { margin-bottom: 0.9rem; }
      #detail-genres, .tag-group { flex-wrap: nowrap; overflow-x: auto; margin: 0 -2rem 0.3rem; padding: 0 1rem 2px; }
      #detail-taggroups { margin-top: 0.4rem; }
      /* Anchor the action-column popovers to the right so a wide menu doesn't overflow the screen. */
      #lib-category-picker, #tracker-panel, #group-panel { left: auto; right: 0; }
      #tracker-panel, #group-panel { min-width: 0; width: min(300px, 78vw); }
      .chapters-head h3 { font-size: 1.05rem; }
      .ch-controls { gap: 0.4rem; width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>
  <div id="app-header">
    <h1 id="app-title"><span id="app-title-text">Comical</span><span id="app-title-caret" class="title-caret" hidden>▾</span></h1>
    <p class="subtitle" id="app-subtitle">Content bridge runtime — browser console (thin client → comical-server)</p>
    <div id="bridge-dropdown" class="bridge-dropdown" hidden>
      <div id="bridge-list"></div>
    </div>
  </div>

  <div id="status" style="display:none"></div>

  <div id="browse-view">
  <span id="caps" class="muted" style="font-size:0.8rem; display:block; margin-bottom:0.5rem"></span>

  <!-- Home-page switcher: Home (list stack) and, when supported, Favorites. -->
  <div id="home-tabs" class="home-tabs">
    <button class="home-tab active" data-tab="home">Home</button>
    <button class="home-tab" id="fav-tab" data-tab="favorites" style="display:none">★ Favorites</button>
  </div>

  <!-- Browse -->
  <div class="controls">
    <input id="query" type="search" placeholder="Search…" style="flex:1; min-width:160px">
    <button id="searchBtn">Search</button>
    <button id="filters-toggle" class="secondary" style="display:none">Filters</button>
  </div>

  <!-- Filters / sort / tags (only when the bridge supports them) -->
  <section class="panel" id="meta-panel" style="display:none">
    <div id="filters-block" style="display:none"><h3>Filters</h3><div id="filters" class="row"></div></div>
    <div id="sort-block" style="display:none; margin-top:0.6rem"><h3>Sort</h3>
      <div class="row"><select id="sort-field"></select><select id="sort-dir"><option value="asc">Asc</option><option value="desc">Desc</option></select></div>
    </div>
    <div id="tags-block" style="display:none; margin-top:0.6rem"><h3>Tags</h3><div id="tags" class="chips"></div></div>
  </section>
  <!-- Home: a vertical stack of list sections (carousel / grid / terminal-infinite grid). -->
  <div id="home-sections"></div>
  <!-- Results: a single full list ("See all") or search results, with infinite-scroll pagination. -->
  <div id="results-pane" style="display:none">
    <div id="results-head" class="results-head"><button id="browse-back" class="link">← Home</button><span id="results-label" class="muted" style="font-size:0.82rem"></span></div>
    <div id="grid" class="grid"></div>
    <!-- A sentinel at the grid's bottom auto-loads the next page as it scrolls into view. -->
    <div id="results-sentinel" style="height:1px"></div>
  </div>
  </div><!-- /browse-view -->

  <!-- Library -->
  <section id="library-view" style="display:none">
    <div class="controls">
      <input id="lib-search" type="search" placeholder="Search your library…" style="flex:1; min-width:160px">
      <select id="lib-sort">
        <option value="lastRead">Recently read</option>
        <option value="added">Recently added</option>
        <option value="title">Title A–Z</option>
        <option value="unread">Most unread</option>
      </select>
    </div>
    <section class="panel" id="lib-categories-panel">
      <div class="row" style="justify-content:space-between">
        <div id="lib-category-chips" class="tabs"></div>
        <details><summary class="muted">Manage categories</summary>
          <div class="controls" style="margin-top:0.6rem">
            <input id="lib-new-category" type="text" placeholder="New category…" style="flex:1; min-width:160px">
            <button id="lib-add-category">Add</button>
          </div>
          <div id="lib-category-manage"></div>
        </details>
      </div>
    </section>
    <div id="library-grid" class="grid"></div>
  </section>

  <!-- History -->
  <section id="history-view" style="display:none">
    <div id="history-list"></div>
  </section>

  <!-- Activity — newly-detected chapters across the library -->
  <section id="activity-view" style="display:none">
    <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:0.75rem; flex-wrap:wrap">
      <button id="activity-refresh">⟳ Check for updates</button>
      <span id="activity-status" class="muted"></span>
    </div>
    <div id="activity-list"></div>
  </section>

  <section id="detail-view" style="display:none">
    <div style="margin-bottom:0.75rem"><button id="back-btn" class="secondary">← Back</button></div>
    <div id="detail">
      <h2 id="detail-title"></h2>
      <div class="detail-head">
        <div class="detail-cover-col">
          <div class="cover-wrap">
            <img id="detail-cover" alt="" />
            <span id="cover-chapter-badge" class="cover-badge" hidden></span>
          </div>
          <div id="detail-actions">
            <button id="read-primary-btn" class="read-primary" hidden>▶ Read</button>
            <div id="lib-menu" hidden>
              <button id="lib-toggle">＋ Library</button>
              <div id="lib-category-picker" hidden></div>
            </div>
            <div id="group-menu" hidden>
              <button id="group-toggle">⧉ Sources ▾</button>
              <div id="group-panel" hidden></div>
            </div>
            <div id="tracker-menu" hidden>
              <button id="tracker-toggle">⟳ Trackers ▾</button>
              <div id="tracker-panel" hidden></div>
            </div>
            <button id="fav-toggle" hidden>☆ Favorite</button>
            <span id="new-badge" class="badge-new" hidden></span>
          </div>
        </div>
        <div class="genres" id="detail-genres"></div>
        <div id="detail-taggroups"></div>
        <div class="meta-stats" id="detail-stats"></div>
        <div class="meta-grid" id="detail-meta"></div>
        <p class="description" id="detail-description"></p>
      </div>
      <div id="page-thumbs" class="page-thumb-grid"></div>
      <section id="chapters-section" hidden>
        <div class="chapters-head">
          <h3>Chapters</h3>
          <div class="ch-controls">
            <div class="ch-tabs" id="chapters-tabs">
              <button class="ch-tab active" data-filter="overview">Overview</button>
              <button class="ch-tab" data-filter="all">All</button>
              <button class="ch-tab" data-filter="read">Read</button>
              <button class="ch-tab" data-filter="unread">Unread</button>
            </div>
            <div class="ch-sort" id="chapters-sort">
              <button data-sort="asc" title="Oldest first">↑</button>
              <button data-sort="desc" class="active" title="Newest first">↓</button>
            </div>
          </div>
        </div>
        <ul id="chapters"></ul>
      </section>
    </div>
  </section>

  <section id="reader-view" style="display:none">
    <div class="reader-toolbar">
      <button id="reader-back" class="secondary">← Back</button>
      <span id="reader-info" class="muted"></span>
      <span style="display:flex; gap:0.4rem">
        <button id="reader-prev" class="secondary">‹ Prev</button>
        <button id="reader-next">Next ›</button>
      </span>
    </div>
    <div id="reader-page"></div>
    <div id="reader-progress"></div>
  </section>

  <!-- Settings page -->
  <section id="settings-view" style="display:none">
    <!-- Bridge Settings -->
    <section class="panel" id="bridge-settings-list" style="display:none"></section>

    <!-- Trackers -->
    <section class="panel" id="trackers-config-panel" style="display:none">
      <details>
        <summary>Trackers</summary>
        <div id="trackers-config-list" style="margin-top:0.75rem"></div>
      </details>
    </section>

    <!-- Registry (M4) -->
    <section class="panel" id="registry-panel">
      <details>
        <summary>Registries</summary>
        <div class="controls" style="margin-top:0.75rem">
          <input id="reg-url" type="text" placeholder="github.com/user/bridges or https://…/index.json" style="flex:1; min-width:220px">
          <button id="reg-add">Add registry</button>
        </div>
        <div id="reg-msg"></div>
        <div id="reg-list"></div>
        <h3 style="margin-top:0.9rem">Available bridges</h3>
        <div id="reg-browse" class="muted">No registries added.</div>
      </details>
    </section>
  </section>

  <nav class="bottom-nav">
    <div class="bn-item active" data-view="browse"><span class="bn-icon"><i data-lucide="layout-grid"></i></span><span class="bn-label">Browse</span></div>
    <div class="bn-item" data-view="library"><span class="bn-icon"><i data-lucide="library"></i></span><span class="bn-label">Library</span></div>
    <div class="bn-item" data-view="history"><span class="bn-icon"><i data-lucide="history"></i></span><span class="bn-label">History</span></div>
    <div class="bn-item" data-view="activity"><span class="bn-icon"><i data-lucide="bell"></i></span><span class="bn-label">Activity</span><span id="activity-badge" class="bn-badge" hidden></span></div>
    <div class="bn-item" data-view="settings"><span class="bn-icon"><i data-lucide="settings"></i></span><span class="bn-label">Settings</span></div>
  </nav>

  <script type="module" src="./app.js"></script>
</body>
</html>
