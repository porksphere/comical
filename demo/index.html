<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comical — Browser Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; background: #0f0f0f; color: #e8e8e8; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    input, button, select { padding: 0.4rem 0.75rem; border-radius: 6px; border: 1px solid #333; background: #1c1c1e; color: inherit; font-size: 0.9rem; }
    button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 0.82rem; color: #888; margin-bottom: 0.75rem; min-height: 1.2em; }
    #status.error { color: #f87171; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
    .card { background: #1c1c1e; border-radius: 8px; padding: 0.75rem; cursor: pointer; transition: background 0.15s; }
    .card:hover { background: #2a2a2e; }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; background: #333; margin-bottom: 0.5rem; }
    .card-title { font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
    .card-sub { font-size: 0.75rem; color: #888; margin-top: 0.2rem; }
    #detail { background: #1c1c1e; border-radius: 8px; padding: 1rem; margin-top: 1rem; display: none; }
    #detail h2 { margin: 0 0 0.4rem; }
    #detail .meta { font-size: 0.82rem; color: #888; margin-bottom: 0.75rem; }
    #chapters { list-style: none; padding: 0; margin: 0; }
    #chapters li { padding: 0.4rem 0; border-bottom: 1px solid #2a2a2e; font-size: 0.88rem; cursor: pointer; }
    #chapters li:hover { color: #60a5fa; }
    #pages { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.75rem; }
    #pages img { width: 100%; border-radius: 4px; background: #333; }
  </style>
</head>
<body>
  <h1>Comical</h1>
  <p class="subtitle">Content bridge runtime — browser demo (thin client → comical-server)</p>

  <div class="controls">
    <input id="query" type="search" placeholder="Search…" value="" style="flex:1; min-width:160px">
    <button id="searchBtn">Search</button>
  </div>
  <div id="status">Initialising…</div>
  <div id="grid" class="grid"></div>
  <div id="detail">
    <h2 id="detail-title"></h2>
    <div class="meta" id="detail-meta"></div>
    <ul id="chapters"></ul>
    <div id="pages"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
