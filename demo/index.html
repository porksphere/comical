<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comical — Browser Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    /* Always reserve the scrollbar gutter so the viewport width never changes
       when a scrollbar appears — otherwise the fixed bottom nav shifts. */
    html { scrollbar-gutter: stable; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem calc(3.5rem + env(safe-area-inset-bottom)); background: #0f0f0f; color: #e8e8e8; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #111113; border-top: 1px solid #242427; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
    .bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.55rem 0; gap: 0.15rem; cursor: pointer; color: #666; user-select: none; }
    .bn-item.active { color: #2563eb; }
    .bn-item:hover { color: #ccc; }
    .bn-icon { display: flex; align-items: center; justify-content: center; }
    .bn-icon svg { width: 1.25rem; height: 1.25rem; stroke-width: 1.75; }
    .bn-item { position: relative; }
    .bn-badge { position: absolute; top: 0.2rem; left: 50%; margin-left: 0.3rem; background: #f59e0b; color: #111; border-radius: 999px; font-size: 0.66rem; font-weight: 700; padding: 0.02rem 0.32rem; }
    .bn-label { font-size: 0.68rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    #app-header { position: relative; }
    #app-title { display: inline-flex; align-items: center; gap: 0.4rem; }
    #app-title.interactive { cursor: pointer; user-select: none; }
    .title-caret { font-size: 0.85rem; color: #888; transition: transform 0.15s; }
    #app-header.open .title-caret { transform: rotate(180deg); }
    .bridge-dropdown { position: absolute; top: 100%; left: 0; z-index: 60; margin-top: 0.3rem; min-width: 220px; max-height: 60vh; overflow-y: auto; padding: 0.35rem; background: #18181b; border: 1px solid #333; border-radius: 0.6rem; box-shadow: 0 10px 28px rgba(0,0,0,0.55); display: flex; flex-direction: column; gap: 0.1rem; }
    .bridge-dropdown[hidden] { display: none; }
    .bridge-dropdown .tab { border-radius: 0.4rem; border: 1px solid transparent; background: transparent; text-align: left; padding: 0.5rem 0.7rem; font-size: 0.9rem; }
    .bridge-dropdown .tab:hover { background: #232327; }
    .bridge-dropdown .tab.active { background: #2563eb; border-color: #2563eb; }
    h3 { font-size: 0.95rem; margin: 0 0 0.6rem; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.25rem; }
    .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .controls { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
    input, button, select { padding: 0.4rem 0.75rem; border-radius: 6px; border: 1px solid #333; background: #1c1c1e; color: inherit; font-size: 0.9rem; }
    label { font-size: 0.82rem; color: #bbb; display: flex; flex-direction: column; gap: 0.25rem; }
    button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
    button:hover { background: #1d4ed8; }
    button.secondary { background: #2a2a2e; border-color: #333; }
    button.secondary:hover { background: #333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 0.82rem; color: #888; margin-bottom: 0.75rem; min-height: 1.2em; }
    #status.error { color: #f87171; }
    section.panel { background: #161618; border: 1px solid #242427; border-radius: 8px; padding: 0.9rem 1rem; margin-bottom: 1rem; }
    details > summary { cursor: pointer; font-size: 0.95rem; font-weight: 600; }
    .muted { color: #888; font-size: 0.8rem; }
    .warn { color: #fbbf24; font-size: 0.82rem; }
    .ok { color: #34d399; font-size: 0.82rem; }
    .err { color: #f87171; font-size: 0.82rem; white-space: pre-wrap; }
    #settings-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.75rem; margin: 0.5rem 0; }
    #settings-form .field-secret label::after { content: " 🔒"; }
    .tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.75rem 0; }
    .tab { padding: 0.35rem 0.7rem; border-radius: 999px; background: #1c1c1e; border: 1px solid #333; cursor: pointer; font-size: 0.82rem; }
    .tab.active { background: #2563eb; border-color: #2563eb; }
    .chips { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .chip { background: #1c1c1e; border: 1px solid #333; border-radius: 999px; padding: 0.2rem 0.6rem; font-size: 0.75rem; color: #bbb; white-space: nowrap; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
    .card { background: #1c1c1e; border-radius: 8px; padding: 0.75rem; cursor: pointer; transition: background 0.15s; }
    .card:hover { background: #2a2a2e; }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; background: #333; margin-bottom: 0.5rem; }
    .card-title { font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
    .card-sub { font-size: 0.75rem; color: #888; margin-top: 0.2rem; }
    /* Home stack: each list is a section rendered per its layout hint. */
    .section { margin: 1.4rem 0; }
    .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: 0.6rem; }
    .section-head h3 { margin: 0; font-size: 1rem; }
    .see-all { background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 0.8rem; padding: 0; white-space: nowrap; }
    .see-all:hover { text-decoration: underline; }
    .carousel { display: flex; gap: 1rem; overflow-x: auto; scrollbar-width: none; padding-bottom: 0.4rem; scroll-snap-type: x mandatory; }
    .carousel::-webkit-scrollbar { display: none; }
    .carousel > .card { flex: 0 0 160px; scroll-snap-align: start; position: relative; }
    .carousel.ranked > .card { flex-basis: 180px; }
    .carousel.hero > .card { flex-basis: 280px; }
    .rank-badge { position: absolute; top: 0.45rem; left: 0.45rem; background: #2563eb; color: #fff; font-weight: 700; font-size: 0.8rem; border-radius: 6px; padding: 0.05rem 0.45rem; }
    .load-more-wrap { text-align: center; margin: 0.8rem 0 0; }
    .results-head { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem; }
    .link { background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 0.85rem; padding: 0; }
    .link:hover { text-decoration: underline; }
    #detail { padding: 1rem; margin-top: 1rem; }
    #detail h2 { margin: 0 0 0.4rem; }
    #fav-toggle { float: right; background: #1c1c1e; border: 1px solid #333; color: #ddd; border-radius: 6px; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.85rem; }
    #fav-toggle:hover { border-color: #60a5fa; }
    #detail .meta { font-size: 0.82rem; color: #888; }
    .detail-head { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .detail-side { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-width: 0; }
    #detail-actions { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
    #detail-cover { width: 120px; height: 180px; object-fit: cover; border-radius: 6px; background: #333; flex-shrink: 0; }
    #detail-genres { display: flex; align-items: center; gap: 0.35rem; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; margin: 0 -2rem 0.6rem; padding: 0 1rem 2px; }
    #detail-genres::-webkit-scrollbar { display: none; }
    .tag-group { display: flex; align-items: center; gap: 0.35rem; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; margin: 0 -2rem 0.4rem; padding: 0 1rem 2px; }
    .tag-group::-webkit-scrollbar { display: none; }
    .tag-group-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; color: #777; margin-right: 0.25rem; }
    .chip.tag { color: #8ab4f8; border-color: #2c4060; }
    .chip-link { cursor: pointer; }
    .chip-link:hover { border-color: #60a5fa; color: #ddd; }
    .tag-filter { position: relative; display: flex; flex-direction: column; gap: 0.3rem; }
    .tag-filter-pills { display: flex; flex-wrap: wrap; gap: 0.25rem; min-height: 0; }
    .tag-pill { display: flex; align-items: center; gap: 0.2rem; background: #1c2a3a; border: 1px solid #2c4060; border-radius: 999px; padding: 0.15rem 0.5rem; font-size: 0.75rem; color: #8ab4f8; }
    .tag-pill button { background: none; border: none; color: #8ab4f8; cursor: pointer; padding: 0; line-height: 1; font-size: 0.9rem; opacity: 0.7; }
    .tag-pill button:hover { opacity: 1; }
    .tag-filter-input { width: 100%; box-sizing: border-box; }
    .tag-filter-dropdown { position: absolute; top: 100%; left: 0; right: 0; z-index: 10; background: #1c1c1e; border: 1px solid #333; border-radius: 4px; max-height: 200px; overflow-y: auto; }
    .tag-option { padding: 0.35rem 0.6rem; font-size: 0.8rem; cursor: pointer; color: #ccc; }
    .tag-option:hover { background: #2a2a2e; }
    .tag-option-empty { padding: 0.35rem 0.6rem; font-size: 0.8rem; color: #666; }
    #detail-description { font-size: 0.88rem; line-height: 1.5; color: #ccc; margin: 0.75rem 0 0; }
    #chapters { list-style: none; padding: 0; margin: 0; }
    #chapters li { border-bottom: 1px solid #2a2a2e; font-size: 0.88rem; }
    #chapters .ch-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; cursor: pointer; }
    #chapters .ch-row:hover { color: #60a5fa; }
    #reader-view { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none; background: #0f0f0f; z-index: 100; }
    .reader-toolbar { position: absolute; top: 0; left: 0; right: 0; z-index: 2; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%); transition: opacity 0.3s; }
    .reader-toolbar.hidden { opacity: 0; pointer-events: none; }
    #reader-info { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reader-toolbar > button, .reader-toolbar > span:last-child { flex-shrink: 0; }
    /* The reader is a 3-slot filmstrip (prev / current / next) that tracks the finger on a
       horizontal swipe and animate-snaps to the neighbour. touch-action:pinch-zoom hands
       single-finger pans to JS (so we own paging) while leaving native pinch-zoom intact. */
    #reader-page { flex: 1; position: relative; overflow: hidden; touch-action: pinch-zoom; }
    .reader-track { position: absolute; inset: 0; display: flex; transform: translateX(-100%); will-change: transform; }
    .reader-track.animate { transition: transform 0.38s cubic-bezier(0.22, 0.61, 0.36, 1); }
    .reader-slot { flex: 0 0 100%; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .reader-slot img { max-width: 100%; max-height: 100%; width: auto; height: auto; display: block; object-fit: contain; user-select: none; -webkit-user-drag: none; cursor: pointer; }
    #reader-progress { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 1; padding: 0.25rem 0.85rem; font-size: 0.8rem; line-height: 1.4; color: rgba(255,255,255,0.82); background: rgba(0,0,0,0.32); border-radius: 0.55rem 0.55rem 0 0; pointer-events: auto; cursor: pointer; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
    /* font-size must be >=16px or iOS Safari auto-zooms the page on focus. */
    #reader-progress .page-jump { width: 2.2em; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.6); color: #fff; font-family: inherit; font-size: 16px; line-height: 1; text-align: center; padding: 0; margin: 0; -moz-appearance: textfield; }
    #reader-progress .page-jump::-webkit-outer-spin-button, #reader-progress .page-jump::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    #reader-progress .page-jump-go { font: inherit; color: #fff; background: rgba(255,255,255,0.16); border: none; border-radius: 0.35rem; padding: 0.05rem 0.5rem; margin-left: 0.4rem; cursor: pointer; }
    .reg-item { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; padding: 0.35rem 0; border-bottom: 1px solid #242427; font-size: 0.84rem; }
    .reg-item:last-child { border-bottom: none; }
    .view-tabs { margin: 0.5rem 0 1rem; }
    .card { position: relative; }
    .badge-unread { position: absolute; top: 0.5rem; right: 0.5rem; background: #2563eb; color: #fff; border-radius: 999px; font-size: 0.72rem; font-weight: 700; padding: 0.1rem 0.45rem; }
    .badge-sources { position: absolute; top: 0.5rem; left: 0.5rem; background: #4b5563; color: #e5e7eb; border-radius: 999px; font-size: 0.68rem; font-weight: 600; padding: 0.1rem 0.4rem; }
    #group-panel { border-top: 1px solid #2a2a2e; margin-top: 0.75rem; padding-top: 0.6rem; }
    .card-categories { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-top: 0.35rem; }
    .cat-chip { cursor: pointer; font-size: 0.7rem; padding: 0.15rem 0.5rem; }
    .cat-chip:hover { border-color: #60a5fa; color: #ddd; }
    .cat-chip-on { background: #1e3a5f; border-color: #2563eb; color: #93c5fd; }
    .badge-new { background: #f59e0b; color: #111; border-radius: 999px; font-size: 0.72rem; font-weight: 700; padding: 0.15rem 0.5rem; }
    #lib-toggle, #fav-toggle { background: #1c1c1e; border: 1px solid #333; color: #ddd; border-radius: 6px; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.85rem; float: none; }
    #lib-toggle:hover, #fav-toggle:hover { border-color: #60a5fa; }
    #lib-category-picker { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.5rem 0 0.75rem; }
    #lib-category-picker label { flex-direction: row; align-items: center; gap: 0.3rem; background: #1c1c1e; border: 1px solid #333; border-radius: 999px; padding: 0.2rem 0.6rem; cursor: pointer; }
    #chapters .ch-name { flex: 1; }
    #chapters .ch-row.read .ch-name { color: #6b7280; }
    #chapters .ch-uptohere { font-size: 0.72rem; color: #888; border: 1px solid #333; background: #1c1c1e; border-radius: 6px; padding: 0.1rem 0.4rem; cursor: pointer; }
    #chapters .ch-uptohere:hover { border-color: #60a5fa; color: #ddd; }
    #chapters .ch-versions-toggle { font-size: 0.72rem; color: #aaa; border: 1px solid #333; background: #1c1c1e; border-radius: 999px; padding: 0.1rem 0.5rem; cursor: pointer; white-space: nowrap; }
    #chapters .ch-versions-toggle:hover { border-color: #60a5fa; color: #ddd; }
    #chapters .ch-versions { list-style: none; margin: 0 0 0.3rem; padding: 0 0 0 1.25rem; }
    #chapters .ch-versions li { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; border-bottom: none; font-size: 0.82rem; color: #bbb; cursor: pointer; }
    #chapters .ch-versions li:hover { color: #60a5fa; }
    #chapters .ch-versions li.read .ch-name { color: #6b7280; }
    #chapters .ch-versions .ch-dot { width: 0.45rem; height: 0.45rem; border-radius: 999px; background: #444; flex-shrink: 0; }
    #chapters .ch-versions li.read .ch-dot { background: #2563eb; }
    .history-item { display: flex; gap: 0.75rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid #242427; }
    .history-item img { width: 44px; height: 66px; object-fit: cover; border-radius: 4px; background: #333; }
    .history-item .hi-body { flex: 1; }
    .history-item .hi-title { font-size: 0.9rem; font-weight: 600; }
    .history-item .hi-sub { font-size: 0.78rem; color: #888; }
    .history-item.read { opacity: 0.55; }
    #tracker-panel { border-top: 1px solid #2a2a2e; margin-top: 0.75rem; padding-top: 0.6rem; }
    .tracker-row { display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0; font-size: 0.85rem; }
    .tracker-row-acts { display: flex; gap: 0.35rem; }
    .tracker-search-result { padding: 0.3rem 0.4rem; cursor: pointer; border-radius: 4px; font-size: 0.84rem; }
    .tracker-search-result:hover { background: #2a2a2e; color: #60a5fa; }
    .tracker-search-result img { width: 28px; height: 42px; object-fit: cover; border-radius: 2px; vertical-align: middle; margin-right: 0.5rem; background: #333; }
    .tracker-config-item { border-bottom: 1px solid #242427; padding: 0.5rem 0; }
    .tracker-config-item:last-child { border-bottom: none; }
    .tracker-config-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.6rem; margin: 0.5rem 0; }
    .bridge-settings-entry { border-bottom: 1px solid #242427; padding: 0.5rem 0; }
    .bridge-settings-entry:last-child { border-bottom: none; padding-bottom: 0; }
    .bridge-settings-entry > summary { cursor: pointer; font-weight: 600; font-size: 0.95rem; }
    .tag-group-label { flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="app-header">
    <h1 id="app-title"><span id="app-title-text">Comical</span><span id="app-title-caret" class="title-caret" hidden>▾</span></h1>
    <p class="subtitle" id="app-subtitle">Content bridge runtime — browser console (thin client → comical-server)</p>
    <div id="bridge-dropdown" class="bridge-dropdown" hidden>
      <div id="bridge-list"></div>
    </div>
  </div>

  <div id="status" style="display:none"></div>

  <div id="browse-view">
  <span id="caps" class="muted" style="font-size:0.8rem; display:block; margin-bottom:0.5rem"></span>

  <!-- Browse -->
  <div class="controls">
    <input id="query" type="search" placeholder="Search…" style="flex:1; min-width:160px">
    <button id="searchBtn">Search</button>
    <button id="filters-toggle" class="secondary" style="display:none">Filters</button>
  </div>

  <!-- Filters / sort / tags (only when the bridge supports them) -->
  <section class="panel" id="meta-panel" style="display:none">
    <div id="filters-block" style="display:none"><h3>Filters</h3><div id="filters" class="row"></div></div>
    <div id="sort-block" style="display:none; margin-top:0.6rem"><h3>Sort</h3>
      <div class="row"><select id="sort-field"></select><select id="sort-dir"><option value="asc">Asc</option><option value="desc">Desc</option></select></div>
    </div>
    <div id="tags-block" style="display:none; margin-top:0.6rem"><h3>Tags</h3><div id="tags" class="chips"></div></div>
  </section>
  <!-- Home: a vertical stack of list sections (carousel / grid / terminal-infinite grid). -->
  <div id="home-sections"></div>
  <!-- Results: a single full list ("See all") or search results, with load-more pagination. -->
  <div id="results-pane" style="display:none">
    <div class="results-head"><button id="browse-back" class="link">← Home</button><span id="results-label" class="muted" style="font-size:0.82rem"></span></div>
    <div id="grid" class="grid"></div>
    <div style="text-align:center; margin:1rem 0"><button id="load-more" class="secondary" style="display:none">Load more</button></div>
  </div>
  </div><!-- /browse-view -->

  <!-- Library -->
  <section id="library-view" style="display:none">
    <section class="panel" id="lib-categories-panel">
      <div class="row" style="justify-content:space-between">
        <div id="lib-category-chips" class="tabs"></div>
        <details><summary class="muted">Manage categories</summary>
          <div class="controls" style="margin-top:0.6rem">
            <input id="lib-new-category" type="text" placeholder="New category…" style="flex:1; min-width:160px">
            <button id="lib-add-category">Add</button>
          </div>
          <div id="lib-category-manage"></div>
        </details>
      </div>
    </section>
    <div id="library-grid" class="grid"></div>
  </section>

  <!-- History -->
  <section id="history-view" style="display:none">
    <div id="history-list"></div>
  </section>

  <!-- Activity — newly-detected chapters across the library -->
  <section id="activity-view" style="display:none">
    <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:0.75rem; flex-wrap:wrap">
      <button id="activity-refresh">⟳ Check for updates</button>
      <button id="activity-clear" class="secondary">Clear</button>
      <span id="activity-status" class="muted"></span>
    </div>
    <div id="activity-list"></div>
  </section>

  <section id="detail-view" style="display:none">
    <div style="margin-bottom:0.75rem"><button id="back-btn" class="secondary">← Back</button></div>
    <div id="detail">
      <h2 id="detail-title"></h2>
      <div class="detail-head">
        <img id="detail-cover" alt="" />
        <div class="detail-side">
          <div class="meta" id="detail-meta"></div>
          <div id="detail-actions">
            <span id="new-badge" class="badge-new" hidden></span>
            <button id="lib-toggle" hidden>＋ Library</button>
            <button id="fav-toggle" hidden>☆ Favorite</button>
          </div>
        </div>
      </div>
      <div class="genres" id="detail-genres"></div>
      <div id="detail-taggroups"></div>
      <p class="description" id="detail-description"></p>
      <div id="lib-category-picker" hidden></div>
      <div id="group-panel" hidden></div>
      <div id="tracker-panel" hidden></div>
      <button id="read-direct-btn" hidden style="margin-bottom:0.75rem">▶ Read</button>
      <ul id="chapters"></ul>
    </div>
  </section>

  <section id="reader-view" style="display:none">
    <div class="reader-toolbar">
      <button id="reader-back" class="secondary">← Back</button>
      <span id="reader-info" class="muted"></span>
      <span style="display:flex; gap:0.4rem">
        <button id="reader-prev" class="secondary">‹ Prev</button>
        <button id="reader-next">Next ›</button>
      </span>
    </div>
    <div id="reader-page"></div>
    <div id="reader-progress"></div>
  </section>

  <!-- Settings page -->
  <section id="settings-view" style="display:none">
    <!-- Bridge Settings -->
    <section class="panel" id="bridge-settings-list" style="display:none"></section>

    <!-- Trackers -->
    <section class="panel" id="trackers-config-panel" style="display:none">
      <details>
        <summary>Trackers</summary>
        <div id="trackers-config-list" style="margin-top:0.75rem"></div>
      </details>
    </section>

    <!-- Registry (M4) -->
    <section class="panel" id="registry-panel">
      <details>
        <summary>Registries</summary>
        <div class="controls" style="margin-top:0.75rem">
          <input id="reg-url" type="text" placeholder="github.com/user/bridges or https://…/index.json" style="flex:1; min-width:220px">
          <button id="reg-add">Add registry</button>
        </div>
        <div id="reg-msg"></div>
        <div id="reg-list"></div>
        <h3 style="margin-top:0.9rem">Available bridges</h3>
        <div id="reg-browse" class="muted">No registries added.</div>
      </details>
    </section>
  </section>

  <nav class="bottom-nav">
    <div class="bn-item active" data-view="browse"><span class="bn-icon"><i data-lucide="layout-grid"></i></span><span class="bn-label">Browse</span></div>
    <div class="bn-item" data-view="library"><span class="bn-icon"><i data-lucide="library"></i></span><span class="bn-label">Library</span></div>
    <div class="bn-item" data-view="history"><span class="bn-icon"><i data-lucide="history"></i></span><span class="bn-label">History</span></div>
    <div class="bn-item" data-view="activity"><span class="bn-icon"><i data-lucide="bell"></i></span><span class="bn-label">Activity</span><span id="activity-badge" class="bn-badge" hidden></span></div>
    <div class="bn-item" data-view="settings"><span class="bn-icon"><i data-lucide="settings"></i></span><span class="bn-label">Settings</span></div>
  </nav>

  <script type="module" src="./app.js"></script>
</body>
</html>
