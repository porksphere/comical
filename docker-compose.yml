# Run the comical host-server (REST API) on its own.
#
# Add sources (a registry, then bridges) at runtime via the API or a client's Settings — none are
# baked into the image. All state (library, settings, installed bridges) persists in ./comical-host.
services:
  comical-host:
    image: ghcr.io/porksphere/comical-host:latest
    container_name: comical-host
    environment:
      - COMICAL_ORIGIN=*
      # - COMICAL_TOKEN=change-me   # optional bearer auth
    volumes:
      - ./comical-host:/data
    ports:
      - 3100:3100
    restart: unless-stopped
